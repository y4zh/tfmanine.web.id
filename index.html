<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportasi MAN 9 Jakarta</title>

    <meta property="og:title" content="Transportasi MAN 9 Jakarta">
    <meta property="og:description" content="Peta interaktif transportasi umum di sekitar MAN 9 Jakarta yang memudahkan pengguna menjelajahi rute Transjakarta dan Mikrotrans.">
    <meta property="og:url" content="https://tfmanine.web.id">
    <meta property="og:image" content="https://tfmanine.web.id/assets/images/tfmanine.web.id_20260326_195500_0000.png">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/svg+xml" href="assets/images/sublogo.svg">
    <meta name="description" content="Transportasi umum menuju MAN 9 Jakarta">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0072bc', accent: '#FF5733' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], data: ['PT Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-50 min-h-screen">
    <nav class="sticky top-0 z-50 bg-primary shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="flex items-center">
                        <img src="assets/images/logo.svg" alt="Transportasi MAN 9 Jakarta" class="h-10 w-auto object-contain">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="relative">
        <div id="map-container" class="w-full h-[400px]"></div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-lg font-bold text-gray-800 mb-4 font-sans">Moda Transportasi</h2>
        <div id="category-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </section>

    <section id="route-list-section" class="max-w-7xl mx-auto px-4 pb-6 hidden">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-bold text-gray-800 font-sans">
                <span id="route-list-title">Daftar Rute</span>
                <span id="route-count" class="text-sm font-normal text-gray-500 ml-2"></span>
            </h2>
            <button onclick="clearFilter()" class="text-sm text-primary font-medium hover:underline font-sans">× Tutup</button>
        </div>

        <div class="mb-4 relative">
            <input type="text" id="route-search" placeholder="Cari rute (cth: 4F, Pulo Gadung)..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-sans text-sm shadow-sm pr-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute right-4 top-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>

        <div id="route-list" class="space-y-3"></div>
    </section>

    <section id="guides-section" class="max-w-7xl mx-auto px-4 pb-8 mb-12">
        <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center font-sans">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
            </svg>
            Panduan Perjalanan
        </h2>
        <div id="guides-container" class="space-y-3"></div>
    </section>

    <footer class="bg-gray-800 text-white py-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
                <div class="md:w-1/2">
                    <img src="assets/images/logo.svg" alt="logo" class="h-10 w-auto mb-3">
                    <p class="text-sm text-gray-400 leading-relaxed font-sans">Platform informasi untuk memudahkan aksesibilitas penggunaan transportasi umum di MAN 9 Jakarta.</p>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-6 pt-4 text-center">
                <p class="text-xs text-gray-500 font-sans">© 2026 Transportasi MAN 9 Jakarta - Data rute dapat berubah sewaktu-waktu.</p>
                <p class="text-xs text-gray-500 font-sans">v1.4.5 (Beta)</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/map.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
